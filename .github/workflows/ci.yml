name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'images/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'images/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DEFAULT_PYTHON: "3.12"
  SRC_DIR: src/nmea_gps_emulator
  TEST_DIR: tests
  # Ignored vulnerabilities in pip-audit (transitive deps, not in distributed package)
  PIP_AUDIT_IGNORE: "--ignore-vuln CVE-2026-4539"

jobs:
  gate:
    runs-on: ubuntu-latest
    if: "!(github.actor == 'dependabot[bot]' && startsWith(github.head_ref, 'dependabot/github_actions/'))"
    steps:
      - run: echo "Running CI"

  lint:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --python ${{ env.DEFAULT_PYTHON }} --extra dev

      - name: Run ruff check
        run: uv run ruff check ${{ env.SRC_DIR }} ${{ env.TEST_DIR }}

      - name: Run ruff format check
        run: uv run ruff format --check ${{ env.SRC_DIR }} ${{ env.TEST_DIR }}

      - name: Run mypy
        run: uv run python -m mypy ${{ env.SRC_DIR }} --ignore-missing-imports

  security:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --python ${{ env.DEFAULT_PYTHON }} --extra dev

      - name: Run pip-audit
        run: uv run pip-audit --skip-editable ${{ env.PIP_AUDIT_IGNORE }}

      - name: Check for secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    needs: [gate, lint]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --python ${{ matrix.python-version }} --extra dev

      - name: Run tests with coverage
        run: uv run pytest ${{ env.TEST_DIR }} -v --cov=${{ env.SRC_DIR }} --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          disable_search: true
          plugins: noop
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    needs: [gate, lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Verify package
        run: |
          uv venv --python ${{ env.DEFAULT_PYTHON }}
          uv pip install dist/*.whl
          .venv/bin/nmea-gps-emulator --help
